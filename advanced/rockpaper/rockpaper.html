<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="rockpaper.css">
    
    </style>
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <button class="img-btn js-paper-btn"><img src=".\img\paper.png"></button>
    <button class="img-btn js-rock-btn"><img src=".\img\rock.png"></button>
    <button class="img-btn js-scissor-btn"><img src=".\img\scissors.png"></button><br>
    <p class="result"></p>
    <p class="moves"></p>
    <p class="reset"></p>
    <p class="dashboard"></p><br>
    <button class="reset-btn" onclick="reset()">Reset Score</button>
    <button class="autobtn" onclick="autoplay();">Auto Play</button>
    <script src="rockpaper.js">
        
    </script>

</body>
</html>

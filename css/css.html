<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM PROJECT</title>
    <style>
        .subscribe-btn{
            color:white;
            border:none;
            font-size:20px;
            background-color:black;
            border-radius:30px;
            padding:10px;
            cursor:pointer;
        }
        .is-subscribed{
            background-color:rgb(231, 228, 228);
            color:black;
        }
        #cost{
            padding:10px;
        }
        .calculate{
            padding:10px;
            background-color:green;
            color:white;
            border:none;
            font-size:15px;
            padding:10.5px 15px;
        }
    </style>
</head>
<body>
    <P>YouTube Subscribe Button</P>
    <Button class="subscribe subscribe-btn" onclick="
    subchange();
    ">
    Subscribe
    </Button>
    <p>
        Amazon Shipping Calculator</p>
    <input  id="cost" type="number" placeholder="cost of order" onkeydown="if(event.key==='Enter'){
        calculate();
    }">  
    <button class="calculate" onclick="calculate();
    ">Calculate</button><br>
    <p id="result"></p><br>
    <script>
        function subchange(){
            let subElt=document.querySelector('.subscribe');
            if(subElt.innerText==='Subscribe'){
            subElt.innerText='Subscribed';
            subElt.classList.add('is-subscribed');
            }else{
            subElt.innerText='Subscribe';
            subElt.classList.remove('is-subscribed');
            }
            

        }
        function calculate(){
            let input=(document.getElementById('cost'));
            let cost=Number(input.value)*100;
            if(cost<4000){
            cost+=1000;
            }
            document.getElementById('result').innerHTML=`$${cost/100}`;


        }
    </script>



</body>
</html>

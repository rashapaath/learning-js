<head>

    console.log(`TAX(10%):${total/10}`);

    "><h1>Total</h1></button>

        //price object
        let price={
            cofee:5,
            bagels:3,
            soup:9
        };
        //count object
        let count={
            cofee:0,
            bagels:0,
            soup:0
        };
        //addtocart fn
        function addtocart(item){
            let totalcount=count[cofee]+count[bagels]+count[soup];
            (totakcount<=10)?count[item]++:alert(`cart is full`);
            console.log(`${count[item]} ${item} added to cart`);

        }
        //totalcalc fn
        let total=0;
        function totalcalc(){
            
            for(let elt in count){
                total+=price[elt]*count[elt];
            }
            console.log(`total:${total}`);
            count={
                cofee:0,
                bagels:0,
                soup:0
            };
        }
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="guessfn(0);">
        HEAD
    </button>
    <button onclick="guessfn(1);">
        TAIL
    </button>
    <h1 id="result">

    </h1>
    <script>
        function guessfn(guess){
            let computerchoice=Math.floor(Math.random()*2);
            let result=(guess===computerchoice)?`you won\ncomputer choice:${computerchoice}`:`you lose \ncomputer choice:${computerchoice}`;
            document.getElementById("result").innerText=result;

        }
    </script>
</body>
</html>

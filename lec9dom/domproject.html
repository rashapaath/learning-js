<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM PROJECT</title>
</head>
<body>
    <P>YouTube Subscribe Button</P>
    <Button class="subscribe" onclick="
    subchange();
    ">
    subscribe
</Button>
    <br><br><br>
    <p>Rock Paper Scissors</p>
    <a href=".\domrockpaper.html">Click here</a>
    <br><br><br>
    <p>Amazon Shipping Calculator<br><br>
    Order under $40=+$10 shipping.<br><br>
    Orders over $40=FREE shipping.</p>
    <input  id="cost" type="number" placeholder="cost of order">  
    <button class="calculate" onclick="calculate();
    ">Calculate</button><br>
    <p id="result"></p><br>
    <a href="https://supersimple.dev/projects/dom/">CSS version of these project</a>
    <script>
        function subchange(){
            let sub=document.querySelector('.subscribe');
            if(sub.innerText==='subscribe'){
            sub.innerText='subscribed';
            }else{
            sub.innerText='subscribe';
            }
            

        }
        function calculate(){
            let cost=parseFloat(document.getElementById('cost').value);

            if(cost<40){
            cost+=10;
            }
            document.getElementById('result').innerHTML=`$${cost}`;


        }
    </script>



</body>
</html>

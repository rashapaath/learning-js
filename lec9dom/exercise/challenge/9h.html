<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input class="input" placeholder="Type Message" 
    onkeydown="
    let inputelt=document.querySelector('.input');
    document.querySelector('.result').innerHTML=inputelt.value;

    ">
    <p class="result"></p>
</body>
</html>
